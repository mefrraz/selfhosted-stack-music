services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    # Define o utilizador e grupo (UID:GID) para execução do processo. 
    # Recomendado usar o ID do utilizador principal do sistema para evitar conflitos de permissões.
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      - ND_LOGLEVEL=info
      - TZ=Europe/Lisbon
    volumes:
      # Caminho para os dados da aplicação (base de dados, cache, etc.)
      - /opt/docker-media/navidrome:/data
      # Caminho para a biblioteca de música. 
      # O sufixo :ro (read-only) garante que o Navidrome não pode apagar ou modificar ficheiros.
      - /mnt/nas/geral/Music:/music:ro

  deemix:
    image: ghcr.io/bambanah/deemix:latest
    container_name: deemix
    restart: unless-stopped
    ports:
      - "6595:6595"
    volumes:
      # Caminho onde as músicas descarregadas serão guardadas.
      - /mnt/nas/geral/Music:/downloads
      # Caminho para as configurações do Deemix.
      - /opt/docker-media/deemix:/config
    environment:
      # PUID/PGID definem as permissões dos ficheiros criados pelo contentor.
      # Deve coincidir com o utilizador do sistema para permitir edição externa (ex: lrcget).
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
      # UMASK_SET=022 define permissões 755 para pastas e 644 para ficheiros.
      - UMASK_SET=022
      # Ativa o modo de utilizador único na interface web.
      - DEEMIX_SINGLE_USER=true